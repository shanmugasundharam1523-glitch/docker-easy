name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t shanmugasundharam/docker-easy:latest .

      - name: Push Docker Image
        run: docker push shanmugasundharam/docker-easy:latest

      - name: Simulated Remote Deployment
        run: |
          echo "Pulling latest Docker image..."
          echo "Stopping old container..."
          echo "Starting new container..."
          echo "Application deployed successfully"

      - name: Slack Notification
        if: always()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"🚀 CI/CD Pipeline Completed for docker-easy\nStatus: ${{ job.status }}\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
